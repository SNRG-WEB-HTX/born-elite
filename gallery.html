<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born Elite | Gallery</title>
    <meta name="description" content="Born Elite Basketball — Photos and videos from the court.">
    <link rel="icon" type="image/png" sizes="192x192" href="born-elite-logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="born-elite-logo.png">
    <link rel="shortcut icon" type="image/png" href="born-elite-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --elite-black: #0A0A0A;
            --elite-green: #55E025;
            --accent-green: #6DBF2E;
            --pure-white: #FFFFFF;
            --glass-white: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.15);
        }
        *{ margin:0; padding:0; box-sizing:border-box; }
        html { overflow-x:hidden; scroll-behavior:smooth; }
        body {
            font-family:'Inter',sans-serif;
            background:var(--elite-black);
            color:var(--pure-white);
            overflow-x:hidden;
            max-width:100vw;
            line-height:1.6;
        }
        body,a,button {
            cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%2355E025" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'),auto;
        }
        .court-pattern {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background-image:
                linear-gradient(90deg,rgba(85,224,37,0.04) 1px,transparent 1px),
                linear-gradient(0deg,rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size:50px 50px;
            pointer-events:none; z-index:1;
        }

        /* ── NAV ── */
        nav {
            position:fixed; top:0; width:100%;
            padding:0.875rem 5vw;
            display:flex; justify-content:space-between; align-items:center;
            z-index:100;
            background:rgba(4,4,4,0.97);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(109,191,46,0.2);
            box-shadow:0 2px 20px rgba(0,0,0,0.5);
        }
        .logo { display:flex; align-items:center; }
        .logo img {
            height:74px; width:auto; display:block;
            filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6));
            transition:filter 0.3s ease;
        }
        .logo img:hover { filter:drop-shadow(0 4px 16px rgba(0,0,0,0.8)); }
        .nav-links { display:flex; gap:2rem; list-style:none; }
        .nav-links a {
            color:rgba(255,255,255,0.82); text-decoration:none;
            font-size:0.85rem; font-weight:600; letter-spacing:0.12em;
            text-transform:uppercase; transition:all 0.25s ease; position:relative;
        }
        .nav-links a::after {
            content:''; position:absolute; bottom:-5px; left:0;
            width:0; height:2px; background:var(--accent-green); transition:width 0.3s ease;
        }
        .nav-links a:hover { color:#55E025; }
        .nav-links a:hover::after { width:100%; }
        .nav-links a.active { color:#55E025; }
        .nav-links a.active::after { width:100%; }

        /* ── PAGE HEADER ── */
        .page-header {
            padding: 8rem 5vw 3rem;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .page-header-label {
            font-size:0.875rem; letter-spacing:0.2em; text-transform:uppercase;
            color:var(--accent-green); font-weight:600; margin-bottom:0.5rem;
        }
        .page-header-title {
            font-family:'Playfair Display',serif;
            font-size:clamp(2.5rem,7vw,5rem); font-weight:900; line-height:1.1;
            color:#FFFFFF;
            text-shadow:0 0 30px rgba(109,191,46,0.4),0 0 60px rgba(85,224,37,0.15);
        }

        /* ── TABS ── */
        .tabs-wrap {
            display:flex; justify-content:center;
            padding:0 5vw 3rem;
            position:relative; z-index:2;
        }
        .tabs {
            display:inline-flex;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(109,191,46,0.25);
            border-radius:100px;
            padding:4px;
            gap:4px;
        }
        .tab-btn {
            padding:0.65rem 2.25rem;
            border:none; border-radius:100px;
            font-family:'Inter',sans-serif; font-size:0.85rem;
            font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
            background:transparent; color:rgba(255,255,255,0.55);
            cursor:pointer; transition:all 0.28s ease;
            display:flex; align-items:center; gap:0.5rem;
        }
        .tab-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
        .tab-btn.active {
            background:var(--elite-green); color:#0A0A0A;
            box-shadow:0 0 16px rgba(85,224,37,0.4),0 0 36px rgba(85,224,37,0.15);
        }
        .tab-btn:not(.active):hover { color:rgba(255,255,255,0.85); }

        /* ── TAB PANELS ── */
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }

        /* ── PHOTO GRID ── */
        .photo-section {
            padding:0 5vw 5rem;
            position:relative; z-index:2;
        }
        .pg-count {
            font-size:0.8rem; color:rgba(255,255,255,0.4);
            letter-spacing:0.1em; margin-bottom:1.5rem;
            text-align:right;
        }
        .photo-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:6px;
        }
        @media(max-width:1024px){ .photo-grid{ grid-template-columns:repeat(3,1fr); } }
        @media(max-width:640px){ .photo-grid{ grid-template-columns:repeat(2,1fr); gap:4px; } }
        @media(max-width:400px){ .photo-grid{ grid-template-columns:1fr; } }

        .pg-item {
            position:relative; aspect-ratio:3/2;
            overflow:hidden; border-radius:6px;
            background:#111;
            cursor:pointer;
            border:1px solid rgba(109,191,46,0.08);
            transition:border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .pg-item:hover { border-color:rgba(85,224,37,0.4); box-shadow:0 0 14px rgba(85,224,37,0.15); }
        .pg-item img {
            width:100%; height:100%;
            object-fit:cover; object-position:center;
            display:block; transition:transform 0.4s ease;
        }
        .pg-item:hover img { transform:scale(1.04); }
        .pg-overlay {
            position:absolute; inset:0;
            background:rgba(0,0,0,0);
            display:flex; align-items:center; justify-content:center;
            opacity:0; transition:all 0.25s ease;
        }
        .pg-overlay svg {
            width:28px; height:28px;
            stroke:rgba(255,255,255,0.95); transform:scale(0.8);
            transition:transform 0.25s ease;
        }
        .pg-item:hover .pg-overlay { opacity:1; background:rgba(0,0,0,0.35); }
        .pg-item:hover .pg-overlay svg { transform:scale(1); }

        /* ── VIDEO GRID ── */
        .video-section {
            padding:0 5vw 5rem;
            position:relative; z-index:2;
        }
        .video-grid {
            display:grid;
            grid-template-columns:repeat(4,minmax(0,1fr));
            gap:0.9rem;
            max-width:1400px;
            margin:0 auto;
            align-items:start;
        }
        @media(max-width:1200px){ .video-grid{ grid-template-columns:repeat(3,minmax(0,1fr)); } }
        @media(max-width:900px){ .video-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); gap:0.8rem; } }
        @media(max-width:540px){ .video-grid{ grid-template-columns:repeat(2,1fr); gap:0.75rem; } }

        .vid-item {
            position:relative;
            aspect-ratio:4/5;
            max-height:min(68vh,620px);
            overflow:hidden; border-radius:14px;
            background:#0d0d0d;
            border:1px solid rgba(109,191,46,0.2);
            box-shadow:0 0 0 1px rgba(109,191,46,0.06),0 0 18px rgba(85,224,37,0.06);
            cursor:pointer; transition:all 0.3s ease;
        }
        @media(max-width:900px){ .vid-item{ aspect-ratio:9/13; max-height:min(62vh,560px); } }
        @media(max-width:540px){ .vid-item{ aspect-ratio:10/13; max-height:min(58vh,500px); } }
        .vid-item:hover {
            border-color:rgba(85,224,37,0.5);
            box-shadow:0 0 0 1px rgba(85,224,37,0.15),0 0 28px rgba(85,224,37,0.2);
        }
        .vid-item video {
            width:100%; height:100%;
            object-fit:cover; display:block;
            transition:transform 0.4s ease;
        }
        .vid-item:hover video { transform:scale(1.03); }
        .vid-play-btn {
            position:absolute; inset:0;
            display:flex; align-items:center; justify-content:center;
            background:rgba(0,0,0,0.25);
            transition:background 0.25s ease;
        }
        .vid-play-btn svg {
            width:46px; height:46px;
            stroke:rgba(255,255,255,0.9); transition:all 0.25s ease;
            filter:drop-shadow(0 0 8px rgba(85,224,37,0.5));
        }
        .vid-item:hover .vid-play-btn { background:rgba(0,0,0,0.1); }
        .vid-item:hover .vid-play-btn svg {
            stroke:var(--elite-green);
            filter:drop-shadow(0 0 16px rgba(85,224,37,0.8));
            transform:scale(1.06);
        }
        .vid-item.is-playing .vid-play-btn { opacity:0; }
        .vid-item.is-playing:hover .vid-play-btn { opacity:1; }

        /* ── LIGHTBOX ── */
        .lightbox {
            position:fixed; inset:0; z-index:500;
            background:rgba(0,0,0,0.96);
            display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none;
            transition:opacity 0.3s ease;
        }
        .lightbox.open { opacity:1; pointer-events:all; }
        .lb-img {
            max-width:92vw; max-height:88vh;
            object-fit:contain; border-radius:4px;
            display:block;
            box-shadow:0 0 0 1px rgba(109,191,46,0.15),0 0 60px rgba(0,0,0,0.8);
        }
        .lb-close {
            position:absolute; top:1.25rem; right:1.25rem;
            width:44px; height:44px; border-radius:50%;
            background:rgba(12,12,12,0.9);
            border:1.5px solid rgba(109,191,46,0.4);
            color:#fff; display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.25s ease; z-index:10;
        }
        .lb-close:hover { border-color:var(--elite-green); box-shadow:0 0 14px rgba(85,224,37,0.4); }
        .lb-close svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2.5; stroke-linecap:round; }
        .lb-nav-btn {
            position:absolute; top:50%; transform:translateY(-50%);
            width:48px; height:48px; border-radius:50%;
            background:rgba(12,12,12,0.85);
            border:1.5px solid rgba(109,191,46,0.35);
            color:#fff; display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:all 0.25s ease; z-index:10;
        }
        .lb-nav-btn:hover { border-color:var(--elite-green); box-shadow:0 0 14px rgba(85,224,37,0.4); color:var(--elite-green); }
        .lb-nav-btn svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
        .lb-prev { left:1.25rem; }
        .lb-next { right:1.25rem; }
        .lb-counter {
            position:absolute; bottom:1.25rem; left:50%; transform:translateX(-50%);
            font-size:0.8rem; letter-spacing:0.1em; color:rgba(255,255,255,0.5);
            font-family:'Space Mono',monospace;
        }
        @media(max-width:640px){
            .lb-nav-btn{ width:38px; height:38px; }
            .lb-prev{ left:0.5rem; } .lb-next{ right:0.5rem; }
        }

        /* ── FOOTER ── */
        footer {
            background:var(--elite-black);
            padding:3rem 5vw 2.5rem;
            border-top:1px solid rgba(109,191,46,0.15);
            text-align:center;
        }
        .footer-content {
            max-width:400px; margin:0 auto;
            display:flex; flex-direction:column; align-items:center; gap:1.5rem;
        }
        .footer-logo img { height:90px; width:auto; filter:drop-shadow(0 2px 12px rgba(0,0,0,0.7)); }
        .social-link {
            color:var(--accent-green); display:flex; align-items:center; justify-content:center;
            width:58px; height:58px; border-radius:50%;
            border:2px solid rgba(109,191,46,0.45);
            background:rgba(109,191,46,0.06); transition:all 0.3s ease;
        }
        .social-link svg { width:28px; height:28px; }
        .social-link:hover {
            color:#fff; border-color:var(--elite-green);
            background:rgba(85,224,37,0.15); box-shadow:0 0 20px rgba(85,224,37,0.5);
            transform:translateY(-3px) scale(1.06);
        }
        .snrg-credit { display:flex; align-items:center; justify-content:center; }
        .snrg-credit a {
            display:inline-flex; align-items:center; gap:0.75rem;
            text-decoration:none; font-family:'Space Mono',monospace;
            font-size:0.8rem; letter-spacing:0.22em; text-transform:uppercase;
            color:var(--accent-green); font-weight:700; transition:all 0.3s ease;
        }
        .snrg-credit a:hover { color:var(--elite-green); letter-spacing:0.28em; }
        .snrg-credit a::before,.snrg-credit a::after {
            content:''; display:inline-block; width:36px; height:1px;
            background:linear-gradient(90deg,transparent,var(--accent-green)); transition:all 0.3s ease;
        }
        .snrg-credit a::after { background:linear-gradient(90deg,var(--accent-green),transparent); }
        .snrg-credit a:hover::before,.snrg-credit a:hover::after { width:48px; background:linear-gradient(90deg,transparent,var(--elite-green)); }
        .snrg-credit a:hover::after { background:linear-gradient(90deg,var(--elite-green),transparent); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0A0A0A; }
        ::-webkit-scrollbar-thumb { background: rgba(109,191,46,0.45); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #55E025; }

        /* ── Page header entrance ── */
        .page-header-label {
            opacity: 0;
            transform: translateY(14px);
            animation: ghFadeRise 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
        }
        .page-header-title {
            opacity: 0;
            transform: translateY(22px);
            animation: ghFadeRise 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
        }
        .tabs-wrap {
            opacity: 0;
            transform: translateY(16px);
            animation: ghFadeRise 0.7s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
        }
        @keyframes ghFadeRise {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Photo grid fade-in on scroll ── */
        .pg-item {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .pg-item.fr-in {
            opacity: 1;
            transform: translateY(0);
        }
        /* Safety net: if JS fails or is slow, show all after 1.5s */
        @keyframes pgFallback {
            to { opacity: 1; transform: translateY(0); }
        }
        .pg-item.fr-fallback {
            animation: pgFallback 0.4s ease forwards;
        }


        /* ── VIDEO MODAL ─────────────────────────────────────── */
        .vid-modal {
            position: fixed; inset: 0; z-index: 600;
            background: rgba(0,0,0,0.97);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .vid-modal.open { opacity: 1; pointer-events: all; }
        .vid-modal-inner {
            position: relative;
            width: min(90vw, 960px);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow:
                0 0 0 1px rgba(109,191,46,0.3),
                0 0 60px rgba(85,224,37,0.15),
                0 30px 80px rgba(0,0,0,0.8);
        }
        .vid-modal-inner video {
            width: 100%; height: 100%;
            max-height: 80vh;
            object-fit: contain;
            display: block; background: #000;
        }
        .vid-modal-close {
            position: absolute; top: 0.9rem; right: 0.9rem;
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(10,10,10,0.92);
            border: 1.5px solid rgba(109,191,46,0.5);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.25s ease; z-index: 10;
        }
        .vid-modal-close:hover {
            border-color: var(--elite-green);
            box-shadow: 0 0 16px rgba(85,224,37,0.5);
            transform: scale(1.08);
        }
        .vid-modal-close svg { width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round; }
        .vid-modal-title {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 0.75rem 1.25rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
            color: rgba(255,255,255,0.5); font-family: 'Space Mono', monospace;
        }
        /* Mobile: true fullscreen */
        @media(max-width:768px) {
            .vid-modal { align-items: stretch; justify-content: stretch; }
            .vid-modal-inner {
                width:100%; max-height:100%; border-radius:0; height:100dvh;
            }
            .vid-modal-inner video { max-height:none; height:100%; }
            .vid-modal-close { top:1rem; right:1rem; width:46px; height:46px; }
        }

        ::selection { background:var(--accent-green); color:var(--elite-black); }

        /* ── HAMBURGER ── */
        .hamburger {
            display:none; flex-direction:column; justify-content:center; align-items:center;
            gap:5px; width:44px; height:44px; background:none; border:none; cursor:pointer; z-index:200; padding:0;
        }
        .ham-line {
            display:block; width:26px; height:2px; background:#FFF; border-radius:2px;
            transition:all 0.35s cubic-bezier(0.4,0,0.2,1); transform-origin:center;
            box-shadow:0 0 6px rgba(255,255,255,0.5);
        }
        .hamburger.is-open .ham-line:nth-child(1){ transform:translateY(7px) rotate(45deg); background:#55E025; box-shadow:0 0 10px rgba(85,224,37,0.8); }
        .hamburger.is-open .ham-line:nth-child(2){ opacity:0; transform:scaleX(0); }
        .hamburger.is-open .ham-line:nth-child(3){ transform:translateY(-7px) rotate(-45deg); background:#55E025; box-shadow:0 0 10px rgba(85,224,37,0.8); }
        .mobile-menu {
            position:fixed; inset:0; z-index:150;
            display:flex; align-items:center; justify-content:center;
            pointer-events:none; visibility:hidden;
        }
        .mobile-menu-bg { position:absolute; inset:0; background:#060606; opacity:0; transition:opacity 0.4s ease; }
        .mobile-menu.is-open { pointer-events:all; visibility:visible; }
        .mobile-menu.is-open .mobile-menu-bg { opacity:0.97; }
        .mobile-menu-close {
            position:absolute; top:max(1rem,env(safe-area-inset-top,0px)); right:max(1rem,env(safe-area-inset-right,0px));
            z-index:3; width:52px; height:52px; display:flex; align-items:center; justify-content:center;
            border-radius:50%; border:1.5px solid rgba(109,191,46,0.38); background:rgba(8,8,8,0.82);
            backdrop-filter:blur(12px); color:#FFF; cursor:pointer;
            opacity:0; transform:translateY(-10px) scale(0.94); transition:all 0.28s ease;
        }
        .mobile-menu.is-open .mobile-menu-close{ opacity:1; transform:translateY(0) scale(1); }
        .mobile-menu-close:hover{ color:#55E025; border-color:rgba(85,224,37,0.7); box-shadow:0 0 20px rgba(85,224,37,0.28); outline:none; }
        .mobile-menu-close svg{ width:20px; height:20px; stroke:currentColor; stroke-width:2.25; fill:none; stroke-linecap:round; stroke-linejoin:round; }
        .mobile-menu-inner{
            position:relative; z-index:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:2rem; width:100%; height:100%; padding:2rem;
        }
        .mobile-logo img { height:80px; width:auto; opacity:0; transform:translateY(-16px); transition:all 0.35s cubic-bezier(0.4,0,0.2,1) 0.1s; }
        .mobile-menu.is-open .mobile-logo img { opacity:1; transform:translateY(0); }
        .mobile-nav-links { list-style:none; display:flex; flex-direction:column; align-items:center; gap:0; }
        .mobile-nav-links li { opacity:0; transform:translateY(20px); transition:all 0.38s cubic-bezier(0.4,0,0.2,1); }
        .mobile-menu.is-open .mobile-nav-links li:nth-child(1){ opacity:1; transform:translateY(0); transition-delay:0.15s; }
        .mobile-menu.is-open .mobile-nav-links li:nth-child(2){ opacity:1; transform:translateY(0); transition-delay:0.22s; }
        .mobile-menu.is-open .mobile-nav-links li:nth-child(3){ opacity:1; transform:translateY(0); transition-delay:0.29s; }
        .mobile-menu.is-open .mobile-nav-links li:nth-child(4){ opacity:1; transform:translateY(0); transition-delay:0.36s; }
        .mobile-menu.is-open .mobile-nav-links li:nth-child(5){ opacity:1; transform:translateY(0); transition-delay:0.43s; }
        .mobile-link {
            display:block; font-family:'Playfair Display',serif;
            font-size:clamp(2.2rem,10vw,3.5rem); font-weight:900;
            color:#FFF; text-decoration:none; text-transform:uppercase;

    <script>

        const R2_BASE = "https://pub-9c98bae60cbe43cbbcce301855f2b450.r2.dev";

        const ALL_PHOTOS = [

        const ALL_VIDEOS = [
            { src:"1-DSC_8412.mp4",   label:"Drill Session" },
            { src:"2-DSC_8390.mp4",   label:"Court Work" },
            { src:"3-DSC_8389.mp4",   label:"Training Clips" },
            { src:"4-DSC_8388.mp4",   label:"Game Day" },
            { src:"5-DSC_8385.mp4",   label:"The Grind" },
            { src:"6-DSC_8197.mp4",   label:"Born Elite Highlights" },
            { src:"born-elite-1.mp4", label:"Born Elite" },
            { src:"born-elite-4.mp4", label:"Born Elite" },
            { src:"borne-elite-6.mp4",label:"Born Elite" }
        ];

        // ── Fisher-Yates shuffle ──────────────────────────────────────
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // Shuffle both on every page load
        const PHOTOS = shuffle(ALL_PHOTOS).map(f => R2_BASE + '/' + f);
        const VIDEOS = shuffle(ALL_VIDEOS);

        // Update tab counts
        const ptc = document.getElementById('photoTabCount');
        const vtc = document.getElementById('videoTabCount');
        if (ptc) ptc.textContent = '(' + PHOTOS.length + ')';
        if (vtc) vtc.textContent = '(' + VIDEOS.length + ')';
        const pgCount = document.getElementById('pgCount');
        if (pgCount) pgCount.textContent = PHOTOS.length + ' photographs';

        // ── Build photo grid dynamically ─────────────────────────────
        const OVERLAY_SVG = '<div class="pg-overlay"><svg viewBox="0 0 24 24" fill="none"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>';
        const photoGrid = document.getElementById('photoGrid');
        PHOTOS.forEach((url, i) => {
            const div = document.createElement('div');
            div.className = 'pg-item';
            div.dataset.index = i;
            div.innerHTML = '<img src="' + url + '" alt="Born Elite Basketball" loading="lazy" />' + OVERLAY_SVG;
            photoGrid.appendChild(div);
        });

        // ── Build video grid dynamically ──────────────────────────────
        const PLAY_BTN = '<div class="vid-play-btn"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><polygon points="10,8 16,12 10,16" fill="currentColor"/></svg></div>';
        const videoGrid = document.getElementById('videoGrid');
        VIDEOS.forEach(v => {
            const div = document.createElement('div');
            div.className = 'vid-item';
            div.dataset.src   = R2_BASE + '/' + v.src;
            div.dataset.label = v.label;
            div.innerHTML =
                '<video preload="metadata" playsinline muted>' +
                    '<source src="' + R2_BASE + '/' + v.src + '" type="video/mp4">' +
                '</video>' + PLAY_BTN;
            videoGrid.appendChild(div);
        });

        // ════════════════════════════════════════════════════════════════
        // LIGHTBOX
        // ════════════════════════════════════════════════════════════════
        let lbIndex = 0;
        function openLb(idx) {
            lbIndex = idx;
            document.getElementById('lbImg').src = PHOTOS[idx];
            document.getElementById('lbImg').alt = 'Photo ' + (idx+1);
            document.getElementById('lbCounter').textContent = (idx+1) + ' / ' + PHOTOS.length;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLb() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
        function lbNav(dir) {
            lbIndex = (lbIndex + dir + PHOTOS.length) % PHOTOS.length;
            document.getElementById('lbImg').src = PHOTOS[lbIndex];
            document.getElementById('lbCounter').textContent = (lbIndex+1) + ' / ' + PHOTOS.length;
        }

        // Wire photo clicks — use event delegation on the grid
        photoGrid.addEventListener('click', e => {
            const item = e.target.closest('.pg-item');
            if (!item) return;
            const idx = parseInt(item.dataset.index);
            openLb(idx);
        });
        document.getElementById('lbClose').addEventListener('click', closeLb);
        document.getElementById('lbPrev').addEventListener('click', () => lbNav(-1));
        document.getElementById('lbNext').addEventListener('click', () => lbNav(1));
        document.getElementById('lightbox').addEventListener('click', e => { if(e.target === e.currentTarget) closeLb(); });
        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowLeft') lbNav(-1);
            if (e.key === 'ArrowRight') lbNav(1);
        });
        let lbStartX = 0;
        document.getElementById('lbImg').addEventListener('touchstart', e => { lbStartX = e.touches[0].clientX; }, {passive:true});
        document.getElementById('lbImg').addEventListener('touchend', e => {
            if (Math.abs(e.changedTouches[0].clientX - lbStartX) > 40)
                lbNav(e.changedTouches[0].clientX - lbStartX < 0 ? 1 : -1);
        });

        // ════════════════════════════════════════════════════════════════
        // VIDEO THUMBNAIL SYSTEM
        // Root cause: iOS Safari blocks video data loading until user
        // gesture AND until the element is visible. Solution:
        // 1. IntersectionObserver watches each vid-item
        // 2. On intersection: call video.load() to trigger network request
        // 3. On loadeddata/seeked: canvas drawImage extracts the frame
        // 4. Set as poster attribute — browser uses it as thumbnail
        // 5. 1200ms safety net: if any video still has no poster, add a
        //    CSS gradient placeholder so the grid never looks broken
        // ════════════════════════════════════════════════════════════════
        function extractPoster(video) {
            try {
                const c = document.createElement('canvas');
                c.width  = video.videoWidth  || 360;
                c.height = video.videoHeight || 450;
                const ctx = c.getContext('2d');
                ctx.drawImage(video, 0, 0, c.width, c.height);
                const url = c.toDataURL('image/jpeg', 0.88);
                if (url && url.length > 1000) {
                    video.setAttribute('poster', url);
                    video.closest('.vid-item').classList.add('has-thumb');
                }
            } catch(e) {}
        }

        const vidThumbObs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const item  = entry.target;
                const video = item.querySelector('video');
                if (!video || video.dataset.loaded) return;
                video.dataset.loaded = '1';
                vidThumbObs.unobserve(item);

                function doSeek() {
                    // Seek to a mid-action frame, not just frame 0
                    try { video.currentTime = 1.5; } catch(e) {}
                }
                video.addEventListener('seeked', function onSeeked() {
                    video.removeEventListener('seeked', onSeeked);
                    extractPoster(video);
                });
                if (video.readyState >= 2) {
                    doSeek();
                } else {
                    video.addEventListener('loadeddata', doSeek, {once:true});
                    video.addEventListener('loadedmetadata', doSeek, {once:true});
                    video.load();
                }
            });
        }, { threshold: 0.05, rootMargin: '100px 0px 100px 0px' });

        // Observe all vid-items (grid was just built above)
        function initVidThumbs() {
            document.querySelectorAll('.vid-item').forEach(item => {
                const video = item.querySelector('video');
                if (!video || video.dataset.loaded) return;
                vidThumbObs.observe(item);
            });
        }

        // Wire video modal + observe thumbnails on tab switch
        const vidModal      = document.getElementById('vidModal');
        const vidModalVideo = document.getElementById('vidModalVideo');
        const vidModalClose = document.getElementById('vidModalClose');
        const vidModalTitle = document.getElementById('vidModalTitle');

        function openVidModal(src, label) {
            vidModalVideo.src   = src;
            vidModalVideo.muted = false;
            vidModalTitle.textContent = label || '';
            vidModal.classList.add('open');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { vidModalVideo.play().catch(() => {}); }, 180);
        }
        function hideVidModal() {
            vidModalVideo.pause();
            vidModalVideo.src = '';
            vidModal.classList.remove('open');
            document.body.style.overflow = '';
        }
        vidModalClose.addEventListener('click', hideVidModal);
        vidModal.addEventListener('click', e => { if(e.target === vidModal) hideVidModal(); });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && vidModal.classList.contains('open')) hideVidModal();
        });
        let vmTY = 0;
        vidModal.addEventListener('touchstart', e => { vmTY = e.touches[0].clientY; }, {passive:true});
        vidModal.addEventListener('touchend',   e => {
            if (e.changedTouches[0].clientY - vmTY > 80) hideVidModal();
        });

        // Event delegation for video clicks (works on dynamically built grid)
        videoGrid.addEventListener('click', e => {
            const item = e.target.closest('.vid-item');
            if (!item) return;
            openVidModal(item.dataset.src, item.dataset.label);
        });

        // ── Tabs ─────────────────────────────────────────────────────
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                // Init thumbnails when switching to videos tab
                if (btn.dataset.tab === 'videos') setTimeout(initVidThumbs, 80);
                // Re-run scroll reveal for photos
                if (btn.dataset.tab === 'photos') {
                    setTimeout(() => {
                        document.querySelectorAll('.pg-item:not(.fr-in)').forEach(item => {
                            item.style.transitionDelay = '0s';
                            item.classList.add('fr-in');
                        });
                    }, 50);
                }
            });
        });

        // Init thumbnails if videos tab active on load
        if (document.getElementById('tab-videos').classList.contains('active')) {
            setTimeout(initVidThumbs, 120);
        }

        // ── Photo scroll reveal ───────────────────────────────────────
        (function() {
            function getCols() {
                return window.innerWidth >= 1024 ? 4 : window.innerWidth >= 640 ? 3 : 2;
            }
            const pgObs = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    const i   = parseInt(entry.target.dataset.index) || 0;
                    const col = i % getCols();
                    entry.target.style.transitionDelay = (col * 0.04) + 's';
                    entry.target.classList.add('fr-in');
                    pgObs.unobserve(entry.target);
                });
            }, { threshold: 0, rootMargin: '0px' });

            // Observe all dynamically-created pg-items
            document.querySelectorAll('.pg-item').forEach(item => pgObs.observe(item));

            // Safety net — reveal anything still hidden after 800ms
            setTimeout(() => {
                document.querySelectorAll('.pg-item:not(.fr-in)').forEach(item => {
                    item.style.transitionDelay = '0s';
                    item.classList.add('fr-in', 'fr-fallback');
                });
            }, 800);
        })();

        // ── Hamburger ────────────────────────────────────────────────
        const hamburger     = document.getElementById('hamburger');
        const mobileMenu    = document.getElementById('mobileMenu');
        const mobileMenuClose = document.getElementById('mobileMenuClose');
        function openMenu() {
            hamburger.classList.add('is-open'); mobileMenu.classList.add('is-open');
            hamburger.setAttribute('aria-expanded','true'); mobileMenu.setAttribute('aria-hidden','false');
            document.body.style.overflow = 'hidden';
        }
        function closeMenu() {
            hamburger.classList.remove('is-open'); mobileMenu.classList.remove('is-open');
            hamburger.setAttribute('aria-expanded','false'); mobileMenu.setAttribute('aria-hidden','true');
            document.body.style.overflow = '';
        }
        hamburger.addEventListener('click', () => { hamburger.classList.contains('is-open') ? closeMenu() : openMenu(); });
        if(mobileMenuClose) mobileMenuClose.addEventListener('click', closeMenu);
        document.querySelectorAll('.mobile-link').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                closeMenu();
                setTimeout(() => { window.location.href = link.getAttribute('href') || ''; }, 220);
            });
        });
        document.addEventListener('keydown', e => { if(e.key === 'Escape') closeMenu(); });

    </script>
